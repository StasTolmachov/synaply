<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация - WordsGO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h2>Регистрация</h2>
  <div id="error" class="error-msg"></div>
  <form id="registerForm">
    <div class="form-group">
      <label>Имя</label>
      <input type="text" id="first_name" required>
    </div>
    <div class="form-group">
      <label>Фамилия</label>
      <input type="text" id="last_name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label>Пароль (минимум 8 символов, заглавная, цифра, спецсимвол)</label>
      <input type="password" id="password" required>
    </div>

    <div style="display: flex; gap: 1rem;">
      <div class="form-group" style="flex: 1;">
        <label>Родной язык</label>
        <select id="source_lang" required></select>
      </div>
      <div class="form-group" style="flex: 1;">
        <label>Изучаемый язык</label>
        <select id="target_lang" required></select>
      </div>
    </div>

    <button type="submit">Создать аккаунт</button>
  </form>
  <a href="login.html" class="link">Уже есть аккаунт? Войти</a>
</div>

<script src="api.js"></script>
<script>
  // Загружаем языки из твоего эндпоинта при загрузке страницы
  async function loadLangs() {
    try {
      const res = await apiFetch('/users/lang');
      const sourceSelect = document.getElementById('source_lang');
      const targetSelect = document.getElementById('target_lang');

      res.source.forEach(l => {
        sourceSelect.innerHTML += `<option value="${l.code}">${l.name}</option>`;
      });
      res.target.forEach(l => {
        targetSelect.innerHTML += `<option value="${l.code}">${l.name}</option>`;
      });

      // Ставим дефолтные значения (например Русский -> Английский)
      sourceSelect.value = "RU";
      targetSelect.value = "EN";
    } catch (err) {
      console.error("Ошибка загрузки языков:", err);
    }
  }
  loadLangs();

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      first_name: document.getElementById('first_name').value,
      last_name: document.getElementById('last_name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      source_lang: document.getElementById('source_lang').value,
      target_lang: document.getElementById('target_lang').value
    };

    try {
      await apiFetch('/users/create', {
        method: 'POST',
        body: JSON.stringify(data)
      });
      alert("Успешно! Теперь войдите.");
      window.location.href = 'login.html';
    } catch (err) {
      document.getElementById('error').textContent = err.message;
    }
  });
</script>
</body>
</html>
