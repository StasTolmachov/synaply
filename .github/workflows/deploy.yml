name: Deploy to DigitalOcean

# Правило: запускать этот скрипт только при push в ветку main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # Робот будет работать на Ubuntu

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
        
          # Вот скрипт, который выполнится НА ТВОЕМ СЕРВЕРЕ:
          script: |
            # ОСТАНАВЛИВАТЬ скрипт при любой ошибке (чтобы GitHub загорелся красным, если что-то пойдет не так)
            set -e
            
            # Переходим в папку с проектом
            cd /root/wordsGo_v2
            
            # 1. Скачиваем ВСЕ свежие обновления с GitHub в буфер сервера
            git fetch origin
            
            # 2. ЖЕСТКО сбрасываем состояние кода на сервере до точной копии ветки main
            git reset --hard origin/main
            
            # Пересобираем и перезапускаем контейнеры в фоне
            docker compose up -d --build
