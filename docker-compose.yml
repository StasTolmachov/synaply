services:
  db:
    image: postgres:15-alpine
    container_name: words_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: words_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - backend
volumes:
  db-data:
networks:
  backend: