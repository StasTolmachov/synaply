services:
  db:
    image: postgres:15-alpine
    container_name: words_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: words_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - backend


  api:
    build: .
    container_name: wordsGO
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_MIGRATE_PATH: ${MIGRATIONS_PATH}
      API_PORT: ${API_PORT}
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  frontend:
    build:
      context: ./frontend_app
    container_name: words_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - api
    networks:
      - backend

volumes:
  db-data:
networks:
  backend: