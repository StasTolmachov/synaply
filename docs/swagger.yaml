definitions:
  gemini.CheckAnswerPracticeWithGeminiResponse:
    properties:
      general_comment:
        type: string
      results:
        items:
          $ref: '#/definitions/gemini.PracticeWithGeminiResult'
        type: array
    type: object
  gemini.PracticeWithGeminiResult:
    properties:
      ideal_translation:
        type: string
      sentence_number:
        type: integer
      status:
        type: string
      status_localized:
        type: string
      teacher_comment:
        type: string
      your_version:
        type: string
    type: object
  gemini.StartPracticeWithGeminiResponse:
    properties:
      level:
        type: string
      sentences:
        items:
          type: string
        type: array
    type: object
  gemini.WordInfoRequest:
    properties:
      source_lang:
        type: string
      source_word:
        type: string
      target_lang:
        type: string
      target_word:
        type: string
    type: object
  gemini.WordInfoResponse:
    properties:
      response:
        type: string
    type: object
  handler.JSONError:
    properties:
      error:
        type: string
    type: object
  models.AnswerReq:
    properties:
      id:
        type: string
      target_word:
        type: string
    type: object
  models.CheckAnswerResponse:
    properties:
      is_correct:
        type: boolean
      next_word:
        $ref: '#/definitions/models.Response'
      total_correct:
        type: integer
    type: object
  models.CreateBatchReq:
    properties:
      source_lang:
        type: string
      target_lang:
        type: string
      words:
        items:
          $ref: '#/definitions/models.WordListResp'
        type: array
    type: object
  models.CreateReq:
    properties:
      comment:
        type: string
      source_lang:
        type: string
      source_word:
        type: string
      target_lang:
        type: string
      target_word:
        type: string
    type: object
  models.CreateUserRequest:
    properties:
      email:
        example: test@user.com
        type: string
      first_name:
        example: test
        type: string
      last_name:
        example: user
        type: string
      password:
        example: SecurePass123!
        minLength: 8
        type: string
      source_lang:
        example: en
        type: string
      target_lang:
        example: en
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - source_lang
    - target_lang
    type: object
  models.GetMeResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      langCodeResp:
        $ref: '#/definitions/models.LangCodeResp'
      last_name:
        type: string
      source_lang:
        type: string
      totalCorrect:
        type: integer
    type: object
  models.LangCodeResp:
    properties:
      source:
        type: string
      target:
        type: string
    type: object
  models.LangItem:
    properties:
      code:
        type: string
      name:
        type: string
    type: object
  models.LangResponse:
    properties:
      source:
        items:
          $ref: '#/definitions/models.LangItem'
        type: array
      target:
        items:
          $ref: '#/definitions/models.LangItem'
        type: array
    type: object
  models.ListOfUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.UserResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      pages:
        type: integer
      total:
        type: integer
    type: object
  models.LoginRequest:
    properties:
      email:
        example: test@user.com
        type: string
      password:
        example: SecurePass123!
        type: string
    required:
    - email
    - password
    type: object
  models.LoginResponse:
    properties:
      source_lang:
        type: string
      token:
        type: string
    type: object
  models.Response:
    properties:
      comment:
        type: string
      id:
        type: string
      source_lang:
        type: string
      source_word:
        type: string
      target_lang:
        type: string
      target_word:
        type: string
    type: object
  models.StartLessonResponse:
    properties:
      total_correct:
        type: integer
      word:
        $ref: '#/definitions/models.Response'
    type: object
  models.TranslateReq:
    properties:
      source_lang:
        type: string
      source_word:
        type: string
      target_lang:
        type: string
      target_word:
        type: string
    type: object
  models.TranslateResp:
    properties:
      id:
        type: string
      source_word:
        type: string
      target_word:
        type: string
    type: object
  models.UpdateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
      role:
        type: string
      source_lang:
        type: string
      target_lang:
        type: string
    type: object
  models.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      role:
        type: string
      source_lang:
        type: string
      target_lang:
        type: string
      total_correct:
        type: integer
      updated_at:
        type: string
    type: object
  models.UserTranslateResponse:
    properties:
      translation:
        type: string
    type: object
  models.WordListReq:
    properties:
      level:
        type: string
      source_lang:
        type: string
      target_lang:
        type: string
      topic:
        type: string
      user_topic:
        type: string
    type: object
  models.WordListResp:
    properties:
      comment:
        type: string
      source_word:
        type: string
      target_word:
        type: string
    type: object
  modelsDB.Playlist:
    properties:
      created_at:
        type: string
      creator_name:
        type: string
      description:
        type: string
      id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  modelsDB.PlaylistDetail:
    properties:
      created_at:
        type: string
      creator_name:
        type: string
      description:
        type: string
      id:
        type: string
      lists:
        items:
          $ref: '#/definitions/modelsDB.PublicWordList'
        type: array
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  modelsDB.PublicWordList:
    properties:
      created_at:
        type: string
      creator_name:
        type: string
      description:
        type: string
      id:
        type: string
      level:
        type: string
      source_lang:
        type: string
      target_lang:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  modelsDB.PublicWordListDetail:
    properties:
      created_at:
        type: string
      creator_name:
        type: string
      description:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/modelsDB.PublicWordListItem'
        type: array
      level:
        type: string
      source_lang:
        type: string
      target_lang:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  modelsDB.PublicWordListItem:
    properties:
      comment:
        type: string
      created_at:
        type: string
      id:
        type: string
      list_id:
        type: string
      source_word:
        type: string
      target_word:
        type: string
    type: object
info:
  contact: {}
  description: AI-Powered Language Learning Platform API
  title: Synaply API
  version: "1.1"
paths:
  /lesson/check:
    post:
      consumes:
      - application/json
      description: Submits an answer for the current word and returns the next word
      parameters:
      - description: Answer data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.AnswerReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CheckAnswerResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Check the answer for a word
      tags:
      - lesson
  /lesson/finish:
    post:
      description: Clears the current lesson state from the cache for the current
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Finish the learning lesson
      tags:
      - lesson
  /lesson/start:
    get:
      description: Gets the next word for the user to learn
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.StartLessonResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "404":
          description: no_words_for_lesson
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Start a learning lesson
      tags:
      - lesson
  /login:
    post:
      consumes:
      - application/json
      description: Login and get JWT token
      parameters:
      - description: Login credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/handler.JSONError'
      summary: User Login
      tags:
      - users
  /playlists:
    get:
      description: Returns a list of all playlists (collections of public word lists)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/modelsDB.Playlist'
            type: array
      summary: Get playlists
      tags:
      - words
  /playlists/{id}:
    get:
      description: Returns detailed information about a playlist, including all its
        public word lists
      parameters:
      - description: Playlist ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsDB.PlaylistDetail'
      summary: Get playlist by ID
      tags:
      - words
  /practice/checkAnswerPractice:
    post:
      consumes:
      - application/json
      description: Submits user translations for the generated sentences and returns
        AI feedback
      parameters:
      - description: User translations
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UserTranslateResponse'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gemini.CheckAnswerPracticeWithGeminiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Check AI practice answer
      tags:
      - AI Practice
  /practice/finishPractice:
    post:
      description: Clears the AI practice session from the cache
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Finish AI practice
      tags:
      - AI Practice
  /practice/startPractice:
    post:
      consumes:
      - application/json
      description: Generates a set of contextual sentences for translation based on
        a topic using Gemini AI
      parameters:
      - description: Topic for practice
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gemini.StartPracticeWithGeminiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Start AI practice
      tags:
      - AI Practice
  /public-lists:
    get:
      description: Returns a list of all public word lists, optionally filtered by
        language
      parameters:
      - description: Source language code (e.g., 'en')
        in: query
        name: source_lang
        type: string
      - description: Target language code (e.g., 'ru')
        in: query
        name: target_lang
        type: string
      - description: Proficiency level (e.g., 'A1')
        in: query
        name: level
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/modelsDB.PublicWordList'
            type: array
      summary: Get public word lists
      tags:
      - words
  /public-lists/{id}:
    get:
      description: Returns detailed information about a public word list, including
        all its words
      parameters:
      - description: Word list ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelsDB.PublicWordListDetail'
      summary: Get public word list by ID
      tags:
      - words
  /users:
    get:
      consumes:
      - application/json
      description: Get list of all users from DB
      parameters:
      - description: Limit records per page (default 10)
        in: query
        name: limit
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: 'Sort order: asc or desc (default desc)'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ListOfUsersResponse'
        "500":
          description: Failed to get users
          schema:
            $ref: '#/definitions/handler.JSONError'
      summary: Get list of users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Register a new user in the system
      parameters:
      - description: User registration info
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.UserResponse'
        "400":
          description: Invalid input or validation info
          schema:
            $ref: '#/definitions/handler.JSONError'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONError'
      summary: Create a new user
      tags:
      - users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Delete user by Slug from DB
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid user Slug
          schema:
            $ref: '#/definitions/handler.JSONError'
        "403":
          description: You can delete only your own account
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Failed to delete user
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Delete user by Slug
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get User By Slug from DB
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserResponse'
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/handler.JSONError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONError'
      summary: Get user by Slug
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user information by its UUID
      parameters:
      - description: User UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: User update info
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated
          schema:
            $ref: '#/definitions/models.UserResponse'
        "400":
          description: Invalid user Slug
          schema:
            $ref: '#/definitions/handler.JSONError'
        "403":
          description: Permission denied
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Failed to update user
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Update user by Slug
      tags:
      - users
  /users/lang:
    get:
      description: Returns a list of supported source and target languages for learning
        and translation
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved languages
          schema:
            $ref: '#/definitions/models.LangResponse'
      summary: Get available languages
      tags:
      - users
  /words/GetMe:
    get:
      consumes:
      - application/json
      description: Returns language settings and total correct answers for the current
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetMeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - words
  /words/create:
    post:
      consumes:
      - application/json
      description: Adds a new word to the user's dictionary
      parameters:
      - description: Word data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "408":
          description: Database timeout
          schema:
            $ref: '#/definitions/handler.JSONError'
        "409":
          description: Word already exists
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Create a new word
      tags:
      - words
  /words/create-batch:
    post:
      consumes:
      - application/json
      description: Adds multiple words (up to 500) to the user's dictionary in a single
        request
      parameters:
      - description: Batch of words to save
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateBatchReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Batch save words
      tags:
      - words
  /words/import:
    post:
      consumes:
      - multipart/form-data
      description: Uploads and processes a CSV or JSON file to add multiple words
        to the user's dictionary
      parameters:
      - description: CSV or JSON file with words
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Import words
      tags:
      - words
  /words/translate:
    post:
      consumes:
      - application/json
      description: Translates a word using DeepL API
      parameters:
      - description: Translation request data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.TranslateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TranslateResp'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.JSONError'
      security:
      - BearerAuth: []
      summary: Translate a word
      tags:
      - words
  /words/wordInfo:
    post:
      consumes:
      - application/json
      description: Returns detailed explanation, grammar, and usage examples for a
        word using Gemini AI
      parameters:
      - description: Data for Gemini AI prompt
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/gemini.WordInfoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully generated explanation
          schema:
            $ref: '#/definitions/gemini.WordInfoResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/handler.JSONError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.JSONError'
        "500":
          description: Internal server error
