limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
server {
    listen 80;
    server_name wordsgo.tolmachov.dev;

    # Leave the path for updating certificates in the future
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wordsgo.tolmachov.dev;

    # Paths to your brand new certificates
    ssl_certificate /etc/letsencrypt/live/wordsgo.tolmachov.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wordsgo.tolmachov.dev/privkey.pem;

    # Disallow embedding your site in an <iframe> on other sites (Clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Prevent the browser from guessing file types
    add_header X-Content-Type-Options "nosniff" always;

    # Strict HTTPS (HSTS) - forces the browser to always use HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ==========================================

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger/ {
        proxy_pass http://api:8080/swagger/;
        proxy_set_header Host $host;
    }
}